name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run unit tests
        run: npm test

  live-database-tests:
    name: Live database tests (${{ matrix.engine }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: postgres
            service: postgres
          - engine: mysql
            service: mysql
          - engine: redis
            service: redis
          - engine: sqlserver
            service: sqlserver
          - engine: oracle
            service: oracle
          - engine: sqlite
            service: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start database container
        if: matrix.service != ''
        run: docker compose -f docker-compose.live-tests.yml up -d ${{ matrix.service }}

      - name: Run live driver test
        env:
          LIVE_DATABASE_ENGINE: ${{ matrix.engine }}
        run: npm run test:live

      - name: Show database logs on failure
        if: failure() && matrix.service != ''
        run: docker compose -f docker-compose.live-tests.yml logs --no-color --tail=200 ${{ matrix.service }}

      - name: Stop database container
        if: always() && matrix.service != ''
        run: docker compose -f docker-compose.live-tests.yml down -v
